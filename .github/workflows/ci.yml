name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Minimal permissions at workflow level
permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Setup and dependency installation
  # ============================================
  setup:
    name: Setup & Install
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Generate cache key
        id: cache-key
        run: echo "key=${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}" >> $GITHUB_OUTPUT
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Verify lockfile is in sync
        run: |
          npm ci --ignore-scripts
          # Check if package-lock.json changed (would indicate out of sync)
          if ! git diff --exit-code package-lock.json; then
            echo "::error::package-lock.json is out of sync with package.json. Run 'npm install' locally and commit the changes."
            exit 1
          fi
      
      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: node_modules
          key: ${{ steps.cache-key.outputs.key }}

  # ============================================
  # Quality checks (lint, images, architecture)
  # ============================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      
      - name: Lint Markdown files
        id: lint
        run: npm run lint:md
        continue-on-error: true
      
      - name: Check image references
        id: images
        run: npm run check:images
        continue-on-error: true
      
      - name: Validate architecture content
        id: architecture
        run: npm run check:architecture
        continue-on-error: true
      
      - name: Check internal links
        id: links
        run: npm run test:links:internal
        continue-on-error: true
      
      - name: Run unit tests
        id: unit
        run: npm run test:unit
        continue-on-error: true
      
      - name: Quality check summary
        run: |
          echo "## Quality Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.lint.outcome }}" == "success" ]; then
            echo "✅ Markdown linting passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Markdown linting failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.images.outcome }}" == "success" ]; then
            echo "✅ Image references valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Image references invalid" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.architecture.outcome }}" == "success" ]; then
            echo "✅ Architecture content valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Architecture content invalid" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.links.outcome }}" == "success" ]; then
            echo "✅ Internal links valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Internal links broken" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ steps.unit.outcome }}" == "success" ]; then
            echo "✅ Unit tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Unit tests failed" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Fail if any check failed
        if: steps.lint.outcome == 'failure' || steps.images.outcome == 'failure' || steps.architecture.outcome == 'failure' || steps.links.outcome == 'failure' || steps.unit.outcome == 'failure'
        run: |
          echo "One or more quality checks failed. See summary above."
          exit 1

  # ============================================
  # Build documentation site
  # ============================================
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      
      - name: Build documentation site
        run: npm run docs:build
      
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4.6.0
        with:
          name: docs-site
          path: docs/
          retention-days: 7

  # ============================================
  # E2E tests against built documentation
  # ============================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [setup, build-docs]
    permissions:
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        project: [chromium-desktop, chromium-mobile]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: ${{ needs.setup.outputs.cache-key }}
      
      - name: Download docs artifact
        uses: actions/download-artifact@v4.1.8
        with:
          name: docs-site
          path: docs
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Run E2E tests
        run: npx playwright test --project=${{ matrix.project }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4.6.0
        with:
          name: e2e-results-${{ matrix.project }}
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ============================================
  # Summary and status check
  # ============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, build-docs, e2e]
    if: always()
    permissions: {}
    
    steps:
      - name: Check results
        run: |
          echo "## CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.quality.result }}" == "success" ]; then
            echo "✅ Quality checks passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Quality checks failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.build-docs.result }}" == "success" ]; then
            echo "✅ Documentation build passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Documentation build failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.e2e.result }}" == "success" ]; then
            echo "✅ E2E tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ E2E tests failed" >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Determine overall status
        if: needs.quality.result != 'success' || needs.build-docs.result != 'success' || needs.e2e.result != 'success'
        run: |
          echo "CI pipeline failed. See individual job results for details."
          exit 1
